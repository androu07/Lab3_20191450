<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Sedes</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha2/dist/css/bootstrap.min.css" rel="stylesheet"
              integrity="sha384-aFq/bzH65dt+w6FI2ooMVUpc+21e0SRygnTpmBvdBgSdnuTN7QbdgL+OapgHtvPp"
              crossorigin="anonymous">
    </head>
    <body>
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <form class="container-fluid justify-content-start">
                <button class="btn btn-outline-success me-2" type="button" th:href="@{/sedes}">Sedes</button>
                <button class="btn btn-outline-success me-2" type="button" th:href="@{/veterinarios}">Veterinarios</button>
                <button class="btn btn-outline-success me-2" type="button" th:href="@{/mascotas}">Mascotas</button>
            </form>
        </nav>
        <div class="container">
            <h2>Lista Sedes</h2>
            <table class="table table-sm">
                <tr>
                    <th>#</th>
                    <th>Nombre de la sede</th>
                    <th>Direccion</th>
                    <th>Teléfono</th>
                    <th></th>
                    <th></th>
                </tr>
                <tr th:each="shipper, info : ${listaSedes}">
                    <td th:text="${info.index + 1}"></td>
                    <td th:text="${sedes.nombresede}"></td>
                    <td th:text="${sedes.direccionsede}"></td>
                    <td th:text="${sedes.telefonosede}"></td>
                    <td><a class="btn btn-primary" th:href="@{'/sedes/veterinarios' + '?id=' + ${sede.idsede}}">Mostrar veterinarios</a></td>
                    <td><a class="btn btn-danger" th:href="@{'/sedes/mascotas' + '?id=' + ${sede.idsede}}">Mostrar mascotas</a></td>
                </tr>
            </table>
        </div>
    </body>
</html>
